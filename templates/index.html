<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mitel Web Config</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Dark Theme Base */
        body {
            background-color: #1c2128;
            color: #e0e6ed;
            font-size: 0.95rem;
            scroll-behavior: smooth;
        }

        /* Stop mobile browsers from zooming in on inputs */
        input,
        select,
        textarea {
            font-size: 16px !important;
        }

        /* Panels and Cards */
        .card {
            background-color: #232830;
            border: 1px solid #3c414b;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .card-header {
            background-color: #00509a;
            color: white;
            border-bottom: 1px solid #3c414b;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 8px 8px 0 0 !important;
        }

        /* Inputs and Dropdowns */
        .form-control,
        .form-select {
            background-color: #161b22 !important;
            color: #ffffff !important;
            /* Forces bright white text */
            border: 1px solid #3c414b;
            border-radius: 6px;
            padding: 0.6rem;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #0d1117 !important;
            color: #ffffff !important;
            border-color: #0072ce;
            box-shadow: 0 0 0 0.2rem rgba(0, 114, 206, 0.25);
        }

        /* Fixes the invisible placeholder text */
        .form-control::placeholder {
            color: #8b949e !important;
            opacity: 1;
        }

        /* Standard Buttons */
        .btn-custom {
            background-color: #2d323a;
            color: #e0e6ed;
            border: 1px solid #3c414b;
        }

        .btn-custom:hover {
            background-color: #0072ce;
            color: white;
            border-color: #0072ce;
        }

        /* Massive Touch Targets for Lists */
        .list-group-item {
            background-color: #1c2128;
            color: #e0e6ed;
            border-color: #3c414b;
            transition: all 0.2s;
        }

        .list-group-item:active,
        .list-group-item:hover {
            background-color: #0072ce !important;
            color: white !important;
        }

        /* Floating Alerts */
        .alert-floating {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            min-width: 90%;
            max-width: 400px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
            background-color: #00509a;
            color: white;
            border: 1px solid #0072ce;
            text-align: center;
            border-radius: 8px;
        }

        .alert-danger {
            background-color: #8b0000;
            border-color: #ff0000;
        }

        /* Mobile Specific Overrides */
        @media (max-width: 991px) {
            body {
                padding-bottom: 80px;
            }

            /* Space for bottom nav */
            .mobile-bottom-bar {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 1030;
                background: #161b22;
                border-top: 1px solid #3c414b;
                padding: 0.5rem 0.25rem;
                justify-content: space-evenly;
                align-items: center;
                box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
            }

            .nav-btn {
                color: #8b949e;
                text-decoration: none;
                font-size: 0.8rem;
                text-align: center;
                padding: 0.5rem 1rem;
                border-radius: 8px;
                width: 30%;
            }

            .nav-btn:active,
            .nav-btn:focus {
                background-color: #2d323a;
                color: white;
            }

            .nav-icon {
                display: block;
                font-size: 1.4rem;
                margin-bottom: 2px;
            }

            .sticky-mobile-push {
                position: sticky;
                top: 0;
                z-index: 1020;
                padding: 10px 0;
                background-color: #232830;
                border-bottom: 1px solid #3c414b;
            }
        }

        /* Toggle Button Group Styles */
        .btn-outline-model {
            color: #8b949e;
            border-color: #3c414b;
            background-color: #232830;
        }

        .btn-check:checked+.btn-outline-model {
            background-color: #00509a;
            color: white;
            border-color: #0072ce;
            box-shadow: none;
        }

        .btn-outline-model:hover {
            background-color: #2d323a;
            color: white;
        }

        @media (min-width: 992px) {
            .mobile-bottom-bar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="statusAlert" class="alert d-none alert-floating font-weight-bold p-3" role="alert"></div>

    <div class="container-fluid py-3">
        <div class="row g-4">

            <div class="col-12 col-lg-6" id="editor-section">
                <div class="card h-100 shadow">
                    <div class="card-header fs-5">⚙️ Editor Setup</div>
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold small">1. Select Target Model</label>
                            <div class="btn-group w-100 shadow-sm" role="group" aria-label="Model Selection">
                                <input type="radio" class="btn-check" name="modelRadio" id="model_generic"
                                    value="generic" autocomplete="off" checked onchange="loadSchema()">
                                <label class="btn btn-outline-model fw-bold py-2" for="model_generic">Generic</label>

                                {% for model in models %}
                                {% if model != 'generic' %}
                                <input type="radio" class="btn-check" name="modelRadio" id="model_{{ model }}"
                                    value="{{ model }}" autocomplete="off" onchange="loadSchema()">
                                <label class="btn btn-outline-model fw-bold py-2" for="model_{{ model }}">{{ model
                                    }}</label>
                                {% endif %}
                                {% endfor %}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold small">2. Target Filename (.cfg)</label>
                            <input type="text" id="filenameInput"
                                class="form-control form-control-lg text-center text-info fw-bold"
                                placeholder="00085DXXXXXX.cfg">
                        </div>

                        <div class="sticky-mobile-push mb-4 text-center pb-4 border-bottom border-secondary">
                            <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm"
                                style="background-color:#00509a;" onclick="generateAndUpload()">🚀 PUSH CONFIG VIA
                                SFTP</button>
                        </div>

                        <form id="configForm">
                            <div id="dynamicFields" class="row g-3"></div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3" id="sftp-section">
                <div class="card shadow mb-4">
                    <div class="card-header">🔑 SFTP Server</div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-6"><input type="text" id="sftpHost" class="form-control" value="10.19.13.1"
                                    placeholder="Host"></div>
                            <div class="col-6"><input type="text" id="sftpUser" class="form-control" value="root"
                                    placeholder="User"></div>
                            <div class="col-12"><input type="password" id="sftpPass" class="form-control"
                                    placeholder="Password"></div>
                            <div class="col-12"><input type="text" id="sftpPath" class="form-control" value="/tftpboot"
                                    placeholder="Path"></div>
                        </div>
                    </div>
                </div>

                <div class="card shadow">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>📁 Server Files</span>
                        <button class="btn btn-sm btn-light text-dark fw-bold" onclick="fetchSftpList()">↻
                            Refresh</button>
                    </div>
                    <div class="card-body p-0">
                        <div id="serverFileList" class="list-group list-group-flush"
                            style="max-height: 400px; overflow-y: auto;">
                            <div class="p-4 text-muted text-center fs-6">Tap Refresh to load files</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3" id="inventory-section">
                <div class="card shadow mb-4">
                    <div class="card-header">📱 Device Actions</div>
                    <div class="card-body">
                        <label class="form-label text-muted fw-bold">Target Phone IP</label>
                        <div class="input-group input-group-lg mb-3">
                            <input type="text" id="invIp" class="form-control" placeholder="10.x.x.x">
                            <button class="btn btn-info fw-bold" onclick="fetchMac()">Get MAC</button>
                        </div>
                        <label class="form-label text-muted fw-bold">Reboot Device</label>
                        <div class="input-group input-group-lg">
                            <input type="password" id="phoneWebPass" class="form-control" value="22222"
                                placeholder="Web Pass">
                            <button class="btn btn-warning fw-bold text-dark" onclick="rebootPhone()">Reboot</button>
                        </div>
                    </div>
                </div>

                <div class="card shadow">
                    <div class="card-header">💾 Saved Database</div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush mb-2" style="max-height: 300px; overflow-y: auto;">
                            {% for ep in endpoints %}
                            <button type="button" class="list-group-item py-3 fs-6"
                                onclick="document.getElementById('filenameInput').value = '{{ ep.mac.replace(':', '').lower() }}.cfg'; window.scrollTo(0,0);">
                                <strong class="text-info">{{ ep.mac }}</strong><br>
                                <span class="text-light">{{ ep.ip }} - {{ ep.label }}</span>
                            </button>
                            {% else %}
                            <div class="p-4 text-muted text-center">No endpoints saved.</div>
                            {% endfor %}
                        </div>
                        <div class="p-3 border-top border-secondary">
                            <label class="form-label text-muted fw-bold small">Import endpoints.json</label>
                            <div class="input-group">
                                <input type="file" id="importFile" class="form-control" accept=".json">
                                <button class="btn btn-outline-light" onclick="importEndpoints()">Import</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="mobile-bottom-bar">
        <a href="#editor-section" class="nav-btn"><span class="nav-icon">⚙️</span>Editor</a>
        <a href="#sftp-section" class="nav-btn"><span class="nav-icon">📁</span>Server</a>
        <a href="#inventory-section" class="nav-btn"><span class="nav-icon">📱</span>Devices</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let activeEditorData = {};

        function showStatus(msg, isError = false) {
            const alert = document.getElementById('statusAlert');
            alert.className = `alert ${isError ? 'alert-danger' : 'alert-success'} alert-floating font-weight-bold p-3`;
            alert.innerText = msg;
            alert.classList.remove('d-none');
            setTimeout(() => alert.classList.add('d-none'), 3500);
        }

        function getSftpConfig() {
            return { host: document.getElementById('sftpHost').value, user: document.getElementById('sftpUser').value, pass: document.getElementById('sftpPass').value, path: document.getElementById('sftpPath').value };
        }

        async function loadSchema() {
            // Read from the checked radio button instead of a select box
            const model = document.querySelector('input[name="modelRadio"]:checked').value;

            const res = await fetch(`/api/schema/${model}`);
            const data = await res.json();
            const container = document.getElementById('dynamicFields');
            container.innerHTML = '';

            data.settings.forEach(setting => {
                const col = document.createElement('div');
                col.className = 'col-12 col-md-6'; // Full width on mobile, half on desktop
                const val = activeEditorData[setting.key] || "";

                let inputHtml = `<label class="form-label text-secondary fw-bold mb-1 mt-2">${setting.label}</label>`;
                if (setting.type === 'choice') {
                    inputHtml += `<select name="${setting.key}" class="form-select form-select-lg">`;
                    inputHtml += `<option value=""></option>`;
                    setting.options.forEach(opt => {
                        const selected = (opt === val) ? 'selected' : '';
                        inputHtml += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                    inputHtml += `</select>`;
                } else {
                    inputHtml += `<input type="text" name="${setting.key}" class="form-control form-control-lg" value="${val}">`;
                }
                col.innerHTML = inputHtml;
                container.appendChild(col);
            });
        }

        async function fetchSftpList() {
            showStatus("Fetching files...");
            const res = await fetch('/api/sftp/list', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(getSftpConfig()) });
            const result = await res.json();

            if (result.status === 'success') {
                const list = document.getElementById('serverFileList');
                list.innerHTML = '';
                if (result.files.length === 0) return list.innerHTML = '<div class="p-4 text-muted text-center">No .cfg files found.</div>';

                result.files.forEach(f => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'list-group-item list-group-item-action py-3 fs-5 text-light border-bottom border-secondary';
                    btn.innerHTML = `📄 ${f}`;
                    btn.onclick = () => downloadSftpFile(f);
                    list.appendChild(btn);
                });
                showStatus(`Found ${result.files.length} configs.`);
            } else showStatus(result.msg, true);
        }

        async function downloadSftpFile(filename) {
            showStatus(`Downloading ${filename}...`);
            const payload = getSftpConfig(); payload.filename = filename;
            const res = await fetch('/api/sftp/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();

            if (result.status === 'success') {
                document.getElementById('filenameInput').value = filename;
                activeEditorData = result.data;

                // Auto-detect model and check the correct radio button
                if (Object.keys(activeEditorData).some(k => k.startsWith('pnhkeypad'))) {
                    document.getElementById('model_6863i').checked = true;
                } else if (Object.keys(activeEditorData).some(k => k.startsWith('softkey') || k.startsWith('topsoftkey'))) {
                    document.getElementById('model_6867i').checked = true;
                } else {
                    document.getElementById('model_generic').checked = true;
                }

                loadSchema();
                window.scrollTo(0, 0);
                showStatus(result.msg);
            } else showStatus(result.msg, true);
        }

        async function generateAndUpload() {
            const form = document.getElementById('configForm');
            const formData = new FormData(form);
            let configLines = ['# Provisioning Profile'];
            for (let [key, value] of formData.entries()) if (value) configLines.push(`${key}: ${value}`);

            let filename = document.getElementById('filenameInput').value.replace(/[^a-zA-Z0-9-.]/g, '').toLowerCase();
            if (!filename) return showStatus("Enter a filename.", true);
            if (!filename.endsWith('.cfg')) filename += '.cfg';

            const payload = { filename: filename, content: configLines.join('\n') + '\n', sftp: getSftpConfig() };
            const res = await fetch('/api/sftp/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            showStatus(result.msg, result.status !== 'success');
        }

        async function importEndpoints() {
            const fileInput = document.getElementById('importFile');
            if (!fileInput.files.length) return showStatus("Select JSON file.", true);
            const formData = new FormData(); formData.append('file', fileInput.files[0]);
            const res = await fetch('/api/endpoints/import', { method: 'POST', body: formData });
            const result = await res.json();
            showStatus(result.msg, result.status !== 'success');
            if (result.status === 'success') setTimeout(() => location.reload(), 1000);
        }

        async function fetchMac() {
            const ip = document.getElementById('invIp').value;
            const res = await fetch('/api/arp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ip }) });
            const result = await res.json();
            if (result.status === 'success') {
                document.getElementById('filenameInput').value = result.mac.replace(/:/g, '').toLowerCase() + '.cfg';
                showStatus(`MAC Found: ${result.mac}`);
                window.scrollTo(0, 0); // Scroll to top to name file
            } else showStatus(result.msg, true);
        }

        async function rebootPhone() {
            const payload = { ip: document.getElementById('invIp').value, password: document.getElementById('phoneWebPass').value };
            const res = await fetch('/api/reboot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            showStatus(result.msg);
        }

        loadSchema();
    </script>
</body>

</html>
